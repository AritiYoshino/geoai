<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GeoAI 平台</title>
  <meta name="description" content="GeoAI 地理智能平台 - 融合多智能体协作、自适应经验库与地理空间分析" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="/static/theme.js"></script>
</head>
<body class="landing-body">
  <!-- 主题切换按钮 -->
  <button
    class="theme-toggle"
    type="button"
    onclick="__theme?.toggleTheme()"
    aria-label="切换主题"
    style="position:fixed;top:16px;right:16px;z-index:1000;"
  >&#x263E;</button>

  <!-- 动态背景装饰 -->
  <div class="landing-bg">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>
  </div>

  <!-- 主容器 -->
  <main class="landing-main">
    <!-- 导航栏 -->
    <nav class="landing-nav">
      <div class="nav-brand">
        <span class="nav-logo">🌍</span>
        <span class="nav-title">GeoAI</span>
      </div>
    </nav>

    <!-- 英雄区域 -->
    <section class="landing-hero">
      <div class="hero-content">
        <h1 class="hero-title">
          <span class="hero-title-main">GeoAI</span>
          <span class="hero-title-sub">地理智能平台</span>
        </h1>
        <p class="hero-desc">
          融合多智能体协作、自适应经验库与地理空间分析，<br />
          提供智能化的地理信息处理与决策支持能力。
        </p>
      </div>
    </section>

    <!-- 入口卡片 -->
    <section class="landing-cards">
      <a href="/gis" class="entry-card card-gis">
        <div class="card-icon">🗺️</div>
        <h2 class="card-title">地理智能系统</h2>
        <p class="card-desc">
          多智能体地理分析助手，支持自然语言交互、<br />
          地图可视化与自适应经验库（ACE）自进化。
        </p>
        <div class="card-action">
          <span class="card-btn">进入系统</span>
          <span class="card-arrow">→</span>
        </div>
      </a>

      <a href="/experiment" class="entry-card card-experiment">
        <div class="card-icon">🔬</div>
        <h2 class="card-title">对比实验系统</h2>
        <p class="card-desc">
          对比不同 ACE 策略的实验管理系统，<br />
          支持多维度评估与结果分析。
        </p>
        <div class="card-action">
          <span class="card-btn">进入系统</span>
          <span class="card-arrow">→</span>
        </div>
      </a>
    </section>

    <!-- 页脚 -->
    <footer class="landing-footer">
      <p>&copy; 2026 GeoAI Platform. All rights reserved.</p>
    </footer>
  </main>
</body>
</html>
